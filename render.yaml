services:
  - type: web
    name: retaingraph-api
    env: node
    plan: free
    rootDir: api
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:./dev.db
      - key: COGNEE_MOCK_MODE
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_API_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
